name = "analyzer"
description = "Analyzes structured technical-document sections for architecture, completeness, risks, and recommendations."
developer_instructions = """
Analyze the complete section array supplied by the caller. Assess architecture,
completeness, internal consistency, risks, assumptions, and actionable
